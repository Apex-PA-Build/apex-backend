name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff linter
        run: ruff check app/ tests/ main.py

      - name: Run ruff formatter check
        run: ruff format --check app/ tests/ main.py

      - name: Run mypy type checker
        run: mypy app/ main.py --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install aiosqlite  # SQLite async driver for tests

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/1
          QDRANT_URL: http://localhost:6333
          APP_ENV: development
          APP_DEBUG: "true"
          APP_SECRET_KEY: ci-secret-key-32-chars-minimum!!
          JWT_SECRET_KEY: ci-jwt-secret-key-32-chars-min!!
          ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=
          ANTHROPIC_API_KEY: test-key
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=75

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t apex-api:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name apex-test \
            -e DATABASE_URL=sqlite+aiosqlite:///:memory: \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e APP_SECRET_KEY=smoke-test-secret \
            -e JWT_SECRET_KEY=smoke-test-jwt \
            -e ENCRYPTION_KEY=c21va2UtdGVzdC1lbmNyeXB0aW9uLWtleQ== \
            -e ANTHROPIC_API_KEY=test \
            -p 8001:8000 \
            apex-api:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8001/health || (docker logs apex-test && exit 1)
          docker stop apex-test
